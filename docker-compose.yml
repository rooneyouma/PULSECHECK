services:

  # Frontend
  frontend:
    build:
      context: ./pulsecheck_frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # Backend (Django + Gunicorn) 
  backend:
    build: ./pulsecheck_backend
    ports:
      - "8000:10000"
    env_file:
      - ./pulsecheck_backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
