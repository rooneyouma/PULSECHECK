name: Deploy PulseCheck

on:
  push:
    branches: [main]

jobs:

  test:
    name: Django Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pulsecheck_backend/requirements.txt

      - name: Install dependencies
        working-directory: pulsecheck_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: pulsecheck_backend
        env:
          DJANGO_SETTINGS_MODULE: pulsecheck.settings
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
        run: python manage.py test --verbosity=2

  # 2. Build & Push 
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test 

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./pulsecheck_backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pulsecheck-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

